name: .NET MAUI CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install .NET MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore StarterApp.sln

    - name: Build solution
      run: dotnet build StarterApp.sln --configuration Release --no-restore

    - name: Run tests with coverage
      run: |
        dotnet test StarterApp.sln --configuration Release --no-build --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --results-directory ./coverage `
          --logger "trx;LogFileName=test-results.trx" `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator `
          -reports:./coverage/**/coverage.opencover.xml `
          -targetdir:./coverage-report `
          -reporttypes:"Html;MarkdownSummaryGithub;Cobertura;Badges"

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-coverage-report
        path: ./coverage-report

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./coverage/**/*.trx

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: ./coverage/**/*.trx
        check_name: Unit Test Results
      continue-on-error: true

    - name: Add coverage to job summary
      if: always()
      run: |
        if (Test-Path ./coverage-report/SummaryGithub.md) {
          "## 📊 Test Coverage Report" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Get-Content ./coverage-report/SummaryGithub.md -Raw | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        }
      shell: pwsh

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage-report/Cobertura.xml
        flags: unittests
        name: rental-app-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

    - name: Code Coverage Summary Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./coverage-report/Cobertura.xml
        badge: true
        format: markdown
        output: both
      continue-on-error: true

    - name: Add coverage comment to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md
      continue-on-error: true

  build-api:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore API dependencies
      run: dotnet restore RentalApp.API/RentalApp.API.csproj

    - name: Build API
      run: dotnet build RentalApp.API/RentalApp.API.csproj --configuration Release --no-restore

    - name: Publish API
      run: dotnet publish RentalApp.API/RentalApp.API.csproj --configuration Release --output ./publish

    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      with:
        name: rental-api
        path: ./publish

  build-android:
    runs-on: windows-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install .NET MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore StarterApp/StarterApp.csproj

    - name: Build Android APK
      run: dotnet build StarterApp/StarterApp.csproj -c Release -f net10.0-android /p:AndroidPackageFormat=apk

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: StarterApp/bin/Release/net10.0-android/**/*.apk

  

  docker-build:
    runs-on: ubuntu-latest
    needs: build-api

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub (optional)
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Build Docker image
      run: docker-compose build api

    - name: Test Docker containers
      run: |
        docker-compose up -d db
        sleep 10
        docker-compose up migrate
        docker-compose down